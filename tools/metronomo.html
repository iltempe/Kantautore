<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronomo & accordatore · Kantautore</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media (max-width:820px){ .cols{ grid-template-columns:1fr; } }
    .bpm { font-size:4rem; font-weight:800; text-align:center; letter-spacing:-.03em; line-height:1; }
    .bpm small { font-size:1rem; color:var(--muted); font-weight:600; }
    .beats { display:flex; gap:10px; justify-content:center; margin:18px 0; }
    .beat { width:20px; height:20px; border-radius:50%; background:var(--bg-soft); border:1px solid var(--border); transition:.05s; }
    .beat.on { background:var(--accent); box-shadow:0 0 16px var(--accent); transform:scale(1.25); }
    .beat.accent.on { background:var(--accent-2); box-shadow:0 0 16px var(--accent-2); }
    input[type=range]{ width:100%; accent-color:var(--accent); }
    .ctr { display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap; margin-top:6px; }
    /* tuner */
    .note { font-size:5rem; font-weight:800; text-align:center; line-height:1; letter-spacing:-.04em; }
    .note small { font-size:1.6rem; vertical-align:super; color:var(--muted); }
    .gauge { position:relative; height:64px; margin:14px 0; }
    .gauge .scale { position:absolute; top:50%; left:0; right:0; height:2px; background:var(--border); }
    .gauge .mid { position:absolute; top:30%; bottom:30%; left:50%; width:2px; background:var(--good); }
    .gauge .needle { position:absolute; top:18%; bottom:18%; width:4px; border-radius:2px; background:var(--accent-2);
      left:50%; transform:translateX(-50%); transition:left .08s, background .1s; }
    .gauge .needle.intune { background:var(--good); }
    .cents { text-align:center; font-family:"SF Mono",monospace; color:var(--muted); }
    .tuner-status { text-align:center; color:var(--muted); min-height:1.3em; }
    .strings { display:flex; gap:8px; justify-content:center; margin-top:12px; }
    .strings .pill { cursor:default; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="page-head">
      <a class="back" href="../index.html" data-i18n="common.back">← Tutti gli strumenti</a>
      <h1 data-i18n="metro.h1">🥁 Metronomo & accordatore</h1>
      <p data-i18n="metro.sub">Tieni il tempo mentre suoni e accorda lo strumento col microfono.</p>
    </div>

    <div class="cols">
      <!-- METRONOMO -->
      <div class="panel">
        <h2 data-i18n="metro.metronome">Metronomo</h2>
        <div class="bpm"><span id="bpmVal">100</span> <small>BPM</small></div>
        <div class="beats" id="beats"></div>
        <input type="range" id="bpmRange" min="30" max="260" value="100">
        <div class="ctr">
          <button class="btn ghost" id="bpmMinus">−</button>
          <button class="btn" id="startBtn" style="min-width:120px" data-i18n="metro.start">▶ Avvia</button>
          <button class="btn ghost" id="bpmPlus">+</button>
        </div>
        <div class="ctr" style="margin-top:14px">
          <button class="btn secondary" id="tap" data-i18n="metro.tap">👆 Tap tempo</button>
          <select id="sig" style="max-width:130px">
            <option value="4">4/4</option>
            <option value="3">3/4</option>
            <option value="2">2/4</option>
            <option value="6">6/8</option>
            <option value="1">click</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;margin:0;color:var(--muted)">
            <input type="checkbox" id="accent" checked style="width:auto"> <span data-i18n="metro.accent">accento sul 1</span>
          </label>
        </div>
      </div>

      <!-- ACCORDATORE -->
      <div class="panel">
        <h2 data-i18n="metro.tuner">Accordatore</h2>
        <div class="note" id="noteName">–<small id="octave"></small></div>
        <div class="gauge">
          <div class="scale"></div>
          <div class="mid"></div>
          <div class="needle" id="needle"></div>
        </div>
        <div class="cents" id="cents" data-i18n="metro.cents">— cent</div>
        <div class="ctr">
          <button class="btn" id="tunerBtn" data-i18n="metro.micOn">🎙 Attiva microfono</button>
        </div>
        <div class="tuner-status" id="tunerStatus" style="margin-top:10px"></div>
        <div class="strings" id="strings"></div>
        <p class="legend muted" style="font-size:.8rem;margin-top:12px;text-align:center" data-i18n="metro.strings">
          Corde chitarra standard: E2 · A2 · D3 · G3 · B3 · E4
        </p>
      </div>
    </div>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/metronomo.js"></script>
</body>
</html>
