<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kantautore · strumenti gratuiti per cantautori</title>
  <meta name="description" content="Strumenti semplici e gratuiti per scrivere canzoni e produrre in casa: editor testi con accordi, dizionario delle rime, metrica, metronomo, accordatore, BPM e tonalità.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="free-badge" data-i18n="home.badge"></span>
      <h1 data-i18n-html="home.title"></h1>
      <p data-i18n="home.sub"></p>
    </section>

    <section class="grid">
      <a class="tool-card" href="tools/editor.html">
        <div class="ico">🎼</div>
        <h3 data-i18n="home.editorT"></h3>
        <p data-i18n="home.editorD"></p>
        <span class="tag" data-i18n="home.tagWrite"></span>
      </a>
      <a class="tool-card" href="tools/accordi.html">
        <div class="ico">🎹</div>
        <h3 data-i18n="home.accordiT"></h3>
        <p data-i18n="home.accordiD"></p>
        <span class="tag" data-i18n="home.tagWrite"></span>
      </a>
      <a class="tool-card" href="tools/rime.html">
        <div class="ico">📖</div>
        <h3 data-i18n="home.rimeT"></h3>
        <p data-i18n="home.rimeD"></p>
        <span class="tag" data-i18n="home.tagWrite"></span>
      </a>
      <a class="tool-card" href="tools/metronomo.html">
        <div class="ico">🥁</div>
        <h3 data-i18n="home.metroT"></h3>
        <p data-i18n="home.metroD"></p>
        <span class="tag" data-i18n="home.tagProd"></span>
      </a>
      <a class="tool-card" href="tools/bpm-key.html">
        <div class="ico">🎚️</div>
        <h3 data-i18n="home.bpmT"></h3>
        <p data-i18n="home.bpmD"></p>
        <span class="tag" data-i18n="home.tagProd"></span>
      </a>
      <a class="tool-card" href="tools/vocal-remover.html">
        <div class="ico">🎤</div>
        <h3 data-i18n="home.vocalT"></h3>
        <p data-i18n="home.vocalD"></p>
        <span class="tag exp" data-i18n="home.tagExp"></span>
      </a>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
